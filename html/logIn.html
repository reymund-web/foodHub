<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="foodHub" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Filled Icons -->
        <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
        <!-- Brand Icons -->
        <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/login-style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="container">
            <div class="left-panel">
                <div class="login-form">
                    <h1>Welcome</h1>
                    <form action="">
                        <div class="username-field">
                            <div class="input-with-icon">
                                <i class="bxf bx-user" style="color:#000000;" ></i>
                                <input type="username" placeholder="Username or Email" required>
                            </div>
                        </div>
                        <div class="password-field">
                            <div class="input-with-icon">
                                <i class="bxf bx-lock" style="color:#000000;"></i>
                                <input type="password" placeholder="Password" required>
                            </div>
                        </div>
                        <div class="forgot-pass">
                            <a href="#" class="forgotPass">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="login-btn">LogIn</button>
    
                        <div class="or"><p>or continue with</p></div>
                        <div class="login-social-btn">
                            <div class="social-icon-btn google">
                                <i class="fab fa-google"></i>
                            </div>
                            <div class="social-icon-btn facebook">
                                <i class="fab fa-facebook-f"></i>
                            </div>
                            <div class="social-icon-btn apple">
                                <i class="fab fa-apple"></i>
                            </div>
                        </div>
                        <div class="register">
                            Don't have an account? <a href="#">Register Now</a>
                        </div>
                    </form>
                </div>
            </div>
            <div class="right-panel">
                <img src="../img/foodHUB.svg" alt="foodHUB Logo">
            </div>
        </div>
    </body>
</html>
